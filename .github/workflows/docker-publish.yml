name: Build and Push to GHCR

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    # We must explicitly grant the pipeline permission to write to the registry
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to the GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          # Using the automatic username and built-in magic token!
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # FORMAT: ghcr.io/your-username/your-repo-name:tag
          # IMPORTANT: Must be entirely lowercase!
          tags: ghcr.io/python-slim-nonroot:1.0.0
